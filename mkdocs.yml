site_name: CRCD User Manual
repo_url: https://github.com/pitt-crc/user-manual
site_url: https://crc-pages.pitt.edu/user-manual/
theme:
  icon:
    annotation: material/alert-circle
  name: material
  logo: _assets/img/pitt_shield_white.png
  favicon: _assets/img/pitt-logo-nav_white.png
  palette:
    primary: custom
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - content.code.copy
    - content.tooltips
    - search.suggest
    - navigation.top
    - navigation.indexes
    - content.code.annotate
    - navigation.footer      # prev/next buttons — helps users walk Steps 1 → 2 → 3
extra:
  homepage: https://crc.pitt.edu
  analytics:
    provider: google
    property: G-M9R3HZF36E
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page by creating an issue in 
            our <a href="https://github.com/pitt-crc/user-manual/issues/new/?title=[Feedback]+{title}+-+{url}" target="_blank" rel="noopener">Github Repository</a>.
extra_css:
  - _assets/css/pitt_colors.css
  - _assets/css/stretched_link.css
plugins:
  - mkdocstrings
  - mkdocs-video:
      is_video: True
      video_autoplay: True
      video_loop: True
  - redirects:
      redirect_maps:
        'data-management/globus-microsoft-onedrive.md': 'https://services.pitt.edu/TDClient/33/Portal/KB/ArticleDet?ID=823'
        slurm/pbs-slurm.md: applications/basic-commands.md
        policies/slurm-limits.md: slurm/job-limits.md
        data-management/file-transfer-methods/globus-microsoft-onedrive.md: data-management/file-transfer-methods/globus-onedrive.md
  - search
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: docs/snippets
      auto_append:
        - includes/abbreviations.md
  - toc:
      toc_depth: 0
      permalink: true
  - tables
