# Project Information
site_name: CRCD User Manual
site_description: University of Pittsburgh Center for Research Computing and Data - User Documentation
site_author: CRCD
site_url: https://crc-pages.pitt.edu/user-manual/
repo_url: https://github.com/pitt-crc/user-manual
repo_name: GitHub/pitt-crc/user-manual
edit_uri: blob/main/docs/

# Theme Configuration
theme:
  icon:
    annotation: material/alert-circle
  name: material
  logo: _assets/img/pitt_shield_white.png
  favicon: _assets/img/pitt-logo-nav_white.png
  language: en
  palette:
    primary: custom
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight
    - navigation.top
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.path
    - toc.follow

# Extra Configuration
extra:
  homepage: https://crc.pitt.edu
  analytics:
    provider: google
    property: G-M9R3HZF36E
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page by creating an issue in
            our <a href="https://github.com/pitt-crc/user-manual/issues/new/?title=[Feedback]+{title}+-+{url}" target="_blank" rel="noopener">Github Repository</a>.
  social:
    - icon: material/home-circle
      link: https://crc.pitt.edu
      name: CRCD Home
    - icon: material/help-circle
      link: https://services.pitt.edu/TDClient/33/Portal/Requests/ServiceDet?ID=1511
      name: Get Help
    - icon: fontawesome/brands/github
      link: https://github.com/pitt-crc
      name: GitHub

extra_css:
  - _assets/css/pitt_colors.css

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - mkdocstrings
  - mkdocs-video:
      is_video: True
      video_autoplay: True
      video_loop: True
  - redirects:
      redirect_maps:
        'data-management/globus-microsoft-onedrive.md': 'https://services.pitt.edu/TDClient/33/Portal/KB/ArticleDet?ID=823'

# Markdown Extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: docs/snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3

